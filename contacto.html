    <main>
        <h1 class="contactenos">contactenos</h1>
        <section class="formulario">
            <form action="https://formspree.io/f/xjvjgdbb" method="POST">
                
                <div class="contenedor2">
                    <label class="textito" for="nombre" >Nombre:</label>
                    <input id=nombre name="nombre" type="text" id="nombre"/>
                </div>
                <div class="contenedor2">
                <label class="textito" for="apellido">Apellido:</label>
                <input id=apellido name="apellido" type="text" id="apellido"/>
                </div>
                <div class="contenedor2">
                <label  class="textito"for="celular">Nro de celular:</label>
                <input class="Red" id=celular name="celular" type="text" id="celular"/>
                </div>
                <div class="contenedor2">
                <label  class="textito"for="Pais">Pais:</label>
                <input id=Pais name="Pais" type="text" id="Pais"/>
                </div>
                <div class="contenedor2">
                <label  class="textito"for="Localidad">Localidad:</label>
                <input id=Localidad name="Localidad" type="text" id="Localidad"/>
                </div>
                <div class="contenedor2">
                <label  class="textito" for="Domicilio">Domicilio:</label>
                <input id=Domicilio name="Domicilio" type="text" id="Domicilio"/>
                </div>
                <div class="contenedor2">
                <label  class="textito"for="CP">Codigo postal:</label>
                <input id=CP name="CP" type="CP" id="CP"/>
                </div>
                <div class="contenedor2">
                    <label class="textito">Producto de su interes:
                        </label>
                        <select  style="color: red; width: 22rem;" name="selector">
                            <option value="Taza">Taza</option>
                            <option value="Llavero">Llavero</option>
                            <option value="Joa">Joya</option>
                            </select>
                </div>
                <div class="contenedor2">
                
                <label class="textito" class="textarea2">comentarios:</label>
                <textarea name="Comentario" cols="150" rows="5"></textarea>
                </div>

                <div class="botoncentrado">
                <input class="enviarbotton"type="submit" name="submit">
                </div>
            </form>
    
    
    
        </section>


    </main>
